<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - HMart</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body style="background: #f4f7f6;">

  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <i class="fa-solid fa-leaf"></i> HMart Admin
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Back to Shop</a></li>
    </ul>
    <div class="nav-actions" id="logoutContainer" style="display:none;">
      <button class="btn btn-outline" onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i> Logout</button>
    </div>
  </nav>

  <div class="admin-container">
    <div class="admin-login" id="loginSection">
      <h2>Admin Login</h2>
      <p style="color:var(--text-light); margin-bottom:1rem;">Hint: Use admin / admin123</p>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="login()">Login</button>
      <div id="loginError" style="color:red; margin-top:1rem; display:none;"></div>
    </div>

    <div class="admin-dashboard container" id="dashboardSection">
      <div class="dashboard-header">
        <h2>Manage Products</h2>
        <button class="btn btn-primary" onclick="openModal()"><i class="fa-solid fa-plus"></i> Add Product</button>
      </div>

      <table id="adminProductsTable">
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- via JS -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal" id="productModal">
    <div class="modal-content">
      <h3 id="modalTitle" style="margin-bottom:1rem;">Add Product</h3>
      <input type="hidden" id="productId">
      
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="pName" placeholder="Product Name">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="pCategory">
          <option value="Groceries">Groceries</option>
          <option value="Notebooks">Notebooks</option>
          <option value="Snacks">Snacks</option>
          <option value="Cow & Cattle Feeds">Cow & Cattle Feeds</option>
        </select>
      </div>
      <div class="form-group">
        <label>Price (₹)</label>
        <input type="number" id="pPrice" placeholder="Price">
      </div>
      <div class="form-group">
        <label>Quantity Unit</label>
        <input type="text" id="pQuantity" placeholder="e.g. 1 kg, 500 g, 1 Pack">
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="text" id="pImage" placeholder="https://...">
      </div>
      
      <div style="display:flex; justify-content:flex-end; gap:1rem; margin-top:2rem;">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveProduct()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://grocery-shop-cs8f.onrender.com/api/products';
    let currentToken = localStorage.getItem('grocery_token');

    if(currentToken) {
      showDashboard();
    }

    async function login() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const res = await fetch('https://grocery-shop-cs8f.onrender.com/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: u, password: p})
      });
      if(res.ok) {
        const data = await res.json();
        currentToken = data.token;
        localStorage.setItem('grocery_token', currentToken);
        showDashboard();
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').innerText = 'Invalid credentials';
      }
    }

    function logout() {
      localStorage.removeItem('grocery_token');
      currentToken = null;
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('dashboardSection').style.display = 'none';
      document.getElementById('logoutContainer').style.display = 'none';
    }

    function showDashboard() {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('dashboardSection').style.display = 'block';
      document.getElementById('logoutContainer').style.display = 'block';
      loadAdminProducts();
    }

    async function loadAdminProducts() {
      const res = await fetch(API);
      const data = await res.json();
      const body = document.getElementById('tableBody');
      body.innerHTML = data.map(p => `
        <tr>
          <td><img src="${p.image}" width="50" style="border-radius:4px" onerror="this.src='https://via.placeholder.com/50'"></td>
          <td>${p.name}</td>
          <td>${p.category}</td>
          <td>₹${p.price}</td>
          <td>${p.quantity}</td>
          <td class="actions-cell">
            <button class="btn btn-outline" style="padding:0.3rem 0.6rem; font-size:0.9rem" onclick='editProduct(${JSON.stringify(p)})'>Edit</button>
            <button class="btn btn-primary" style="padding:0.3rem 0.6rem; font-size:0.9rem; background:var(--danger); border-color:var(--danger);" onclick="deleteProduct('${p._id}')">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    function openModal() {
      document.getElementById('productModal').style.display = 'flex';
      document.getElementById('modalTitle').innerText = 'Add Product';
      document.getElementById('productId').value = '';
      document.getElementById('pName').value = '';
      document.getElementById('pPrice').value = '';
      document.getElementById('pQuantity').value = '';
      document.getElementById('pImage').value = '';
      document.getElementById('pCategory').value = 'Groceries';
    }

    function closeModal() {
      document.getElementById('productModal').style.display = 'none';
    }

    function editProduct(p) {
      document.getElementById('productModal').style.display = 'flex';
      document.getElementById('modalTitle').innerText = 'Edit Product';
      document.getElementById('productId').value = p._id;
      document.getElementById('pName').value = p.name;
      document.getElementById('pPrice').value = p.price;
      document.getElementById('pQuantity').value = p.quantity;
      document.getElementById('pImage').value = p.image;
      document.getElementById('pCategory').value = p.category;
    }

    async function saveProduct() {
      const id = document.getElementById('productId').value;
      const p = {
        name: document.getElementById('pName').value,
        category: document.getElementById('pCategory').value,
        price: Number(document.getElementById('pPrice').value),
        quantity: document.getElementById('pQuantity').value,
        image: document.getElementById('pImage').value
      };
      
      const method = id ? 'PUT' : 'POST';
      const url = id ? `${API}/${id}` : API;
      
      const res = await fetch(url, {
        method: method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${currentToken}`
        },
        body: JSON.stringify(p)
      });
      
      if(res.ok) {
        closeModal();
        loadAdminProducts();
      } else {
        alert("Failed to save. Unauthorized?");
      }
    }

    async function deleteProduct(id) {
      if(!confirm("Are you sure you want to delete this?")) return;
      const res = await fetch(`${API}/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${currentToken}` }
      });
      if(res.ok) {
        loadAdminProducts();
      } else {
        alert("Failed to delete.");
      }
    }
  </script>
</body>
</html>
