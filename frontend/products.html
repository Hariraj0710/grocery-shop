<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - HMart Grocery Shop</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <i class="fa-solid fa-leaf"></i> HMart
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html" style="color: var(--primary);">All Products</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
    <div class="nav-actions">
      <a href="tel:+919876543210" class="btn btn-primary"><i class="fa-solid fa-phone"></i> Call Now</a>
      <a href="admin.html" class="btn btn-outline"><i class="fa-solid fa-user"></i> Admin</a>
    </div>
  </nav>

  <div class="container" style="margin-top: 2rem;">
    <div class="filter-bar">
      <input type="text" id="searchInput" class="search-input" placeholder="Search products...">
      <div class="category-tabs" id="categoryTabs">
        <div class="tab active" data-category="All">All</div>
        <div class="tab" data-category="Groceries">Groceries</div>
        <div class="tab" data-category="Notebooks">Notebooks</div>
        <div class="tab" data-category="Snacks">Snacks</div>
        <div class="tab" data-category="Cow & Cattle Feeds">Cow & Cattle Feeds</div>
      </div>
    </div>

    <div class="products-grid" id="productsGrid">
      <!-- Products will be dynamically loaded here by JS -->
      <div style="text-align:center; width: 100%; grid-column: 1 / -1;">
        <i class="fa-solid fa-spinner fa-spin fa-2x"></i><br>Loading Products...
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 HMart Grocery Shop. All rights reserved.</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
